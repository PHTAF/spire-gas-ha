name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: A clear description of the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why would this be useful?
    validations:
      required: false
