name: Bug Report
description: Report a problem with the Spire Gas integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help diagnose the issue.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.2.0
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Spire Gas integration version
      placeholder: e.g. 1.2.0
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Go to Settings → System → Logs and filter for `spire_gas`.
        Paste any relevant lines here.
      render: text
    validations:
      required: false
